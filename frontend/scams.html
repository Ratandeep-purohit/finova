<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finova - Scenarios</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dashboard-layout">
    
    <aside class="sidebar">
        <h1 class="logo" style="color: var(--primary);">Finova.</h1>
        <nav>
            <div class="nav-label">Menu</div>
            <ul>
                <li><a href="/dashboard.html">Dashboard</a></li>
                <li><a href="/leaderboard.html">Leaderboard</a></li>
            </ul>
            <div class="nav-label">Modules</div>
            <ul>
                <li><a href="/stock_market.html">Stock Market</a></li>
                <li><a href="/scams.html" class="active">UPI Safety</a></li>
                <li><a href="/tax.html">Tax Challenge</a></li>
            </ul>
            <div class="nav-label">Account</div>
            <ul>
                <li><button class="btn btn-outline w-100" onclick="logout()" style="margin-top: 0.5rem;">Logout</button></li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h2>UPI Safety</h2>
                <p class="text-secondary text-sm">Identify digital scams and phishing links.</p>
            </div>
            <div class="user-stats">
                <span class="stat-pill xp-pill">Lvl <span id="level-txt">1</span></span>
                <span class="stat-pill balance-pill">₹<span id="balance-txt">10000.00</span></span>
            </div>
        </header>

        <section class="center-content p-0" style="min-height: 40vh;">
            <div class="card" id="scenario-card" style="width: 100%; max-width: 500px; text-align: center;">
                <h3 id="sc-type" class="text-sm text-secondary font-bold mb-2">Loading...</h3>
                <h2 id="sc-title" class="text-xl mb-4 text-primary-color">Loading Scenario...</h2>
                <p id="sc-desc" class="mb-6 mt-4"></p>
                
                <div id="sc-actions" class="flex gap-4 justify-between w-100">
                    <!-- populated by js -->
                </div>
                
                <div id="sc-result" style="display: none; text-align: left;"></div>
                <button class="btn btn-primary w-100 mt-4" id="next-btn" style="display: none;" onclick="loadScenario('SCAM')">Next Scenario</button>
            </div>
        </section>

    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/scenarios.js"></script>
    <script>
        authCheck();
        fetchProfile();
        loadScenario('SCAM');
    </script>
</body>
</html>
