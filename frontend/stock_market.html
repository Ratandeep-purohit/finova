<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finova - Stock Market</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dashboard-layout">
    
    <aside class="sidebar">
        <div class="logo">Finova.</div>
        <nav>
            <ul>
                <li><a href="/dashboard.html">Dashboard</a></li>
                <li><a href="/stock_market.html" class="active">Stock Market</a></li>
                <li><a href="/scams.html">Scam Simulator</a></li>
                <li><button class="btn btn-outline w-100" onclick="logout()" style="margin-top: 2rem;">Logout</button></li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <header class="topbar">
            <h2>Stock Market</h2>
            <div class="user-stats">
                <div class="stat-pill"><span id="level-txt">Lvl 1</span></div>
                <div class="stat-pill xp-pill"><span id="xp-txt">0 XP</span></div>
                <div class="stat-pill balance-pill">₹<span id="balance-txt">10000.00</span></div>
            </div>
        </header>

        <section class="overview">
            <div id="market-msg" class="success-msg"></div>
            <div id="market-err" class="error-msg"></div>

            <div class="grid" style="grid-template-columns: 2fr 1fr;">
                <div class="card">
                    <h3>Available Stocks</h3>
                    <p class="text-secondary" style="margin-bottom: 1rem; font-size: 0.9rem;">Prices fluctuate automatically every 5 seconds.</p>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Symbol</th>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="stock-list">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h3>Your Portfolio</h3>
                    <div id="portfolio-list" style="margin-top: 1rem;">
                        <!-- Populated by JS -->
                        <p class="text-secondary">You don't own any stocks yet.</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/stocks.js"></script>
    <script>
        authCheck();
        fetchProfile();
        initStocks();
    </script>
</body>
</html>
