<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finova - Tax Challenge</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dashboard-layout animate-fade-in">
    
    <aside class="sidebar">
        <div class="logo">🚀 Finova</div>
        <nav>
            <div class="nav-label">Main menu</div>
            <ul>
                <li><a href="/dashboard.html">🏠 Dashboard</a></li>
                <li><a href="/leaderboard.html">🏆 Leaderboard</a></li>
            </ul>
            <div class="nav-label">Learning Modules</div>
            <ul>
                <li><a href="/stock_market.html">📈 Stock Simulator</a></li>
                <li><a href="/scams.html">🛡️ UPI Safety</a></li>
                <li><a href="/tax.html" class="active">📄 Tax Challenge</a></li>
            </ul>
            <div class="nav-label">Account</div>
            <ul>
                <li><button class="btn btn-outline w-100" onclick="logout()" style="margin-top: 1rem;">Log Out</button></li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h2>📄 Tax Challenge</h2>
                <p class="text-secondary text-sm">Understand exactly why we pay taxes, and how to file them.</p>
            </div>
            <div class="user-stats">
                <div class="stat-pill xp-pill">Lvl <span id="level-txt">1</span> | <span id="xp-txt">0</span> XP</div>
                <div class="stat-pill balance-pill">₹<span id="balance-txt">10000.00</span></div>
            </div>
        </header>

        <section class="center-content p-0" style="min-height: 50vh;">
            <div class="card" id="scenario-card" style="width: 100%; max-width: 500px; text-align: center;">
                <div class="badge-icon mx-auto mb-4" style="color: var(--primary); margin: 0 auto; margin-bottom: 1rem;">🧾</div>
                <h3 id="sc-type" class="text-sm tracking-wide font-bold mb-2">Loading...</h3>
                <h2 id="sc-title" class="text-xl mb-4 text-primary-color">Loading Scenario...</h2>
                <p id="sc-desc" class="text-secondary mb-6"></p>
                
                <div id="sc-actions" class="flex gap-4 justify-between w-100">
                    <!-- populated by js -->
                </div>
                
                <div id="sc-result" style="display: none; text-align: left;"></div>
                <button class="btn btn-outline w-100 mt-4" id="next-btn" style="display: none;" onclick="loadScenario('TAX')">Next Challenge</button>
            </div>
        </section>

    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/scenarios.js"></script>
    <script>
        authCheck();
        fetchProfile();
        loadScenario('TAX');
    </script>
</body>
</html>
