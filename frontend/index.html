<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finova - Learn Finance</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-card {
            border-top: 4px solid var(--primary);
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body class="center-content">
    
    <div class="card login-card">
        <h1 class="logo justify-center mb-2" style="margin-bottom: 0.5rem; justify-content: center; text-align: center; color: var(--primary);">Finova</h1>
        <p class="text-center text-secondary mb-6 text-sm">Interactive financial literacy platform.</p>
        
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group mb-6">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>
        
        <div id="login-error" class="text-danger text-center text-sm mb-4"></div>
        <button class="btn btn-primary w-100" onclick="login()">Log In</button>
        
        <p class="text-xs text-secondary text-center mt-4">
            Don't have an account? <a href="/register.html" class="text-primary-color font-bold">Create one</a>.
        </p>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
