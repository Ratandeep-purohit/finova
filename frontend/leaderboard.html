<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finova - Leaderboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="dashboard-layout">

    <aside class="sidebar">
        <h1 class="logo" style="color: var(--primary);">Finova.</h1>
        <nav>
            <div class="nav-label">Menu</div>
            <ul>
                <li><a href="/dashboard.html">Dashboard</a></li>
                <li><a href="/leaderboard.html" class="active">Leaderboard</a></li>
            </ul>
            <div class="nav-label">Modules</div>
            <ul>
                <li><a href="/stock_market.html">Stock Market</a></li>
                <li><a href="/scams.html">UPI Safety</a></li>
                <li><a href="/tax.html">Tax Challenge</a></li>
            </ul>
            <div class="nav-label">Learning</div>
        <ul>
            <li><a href="/videos.html">Video Library</a></li>
        </ul>
        <div class="nav-label">Rewards</div>
        <ul>
            <li><a href="/shop.html">XP Shop</a></li>
        </ul>
        <div class="nav-label">Account</div>
            <ul>
                <li><button class="btn btn-outline w-100" onclick="logout()" style="margin-top: 0.5rem;">Logout</button>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h2>Leaderboard</h2>
                <p class="text-secondary text-sm">View top users by earned XP and Net Worth.</p>
            </div>
            <div class="user-stats">
                <span class="stat-pill xp-pill"><span id="level-txt">1</span></span>
                <span class="stat-pill balance-pill">₹<span id="balance-txt">10000.00</span></span>
            </div>
        </header>

        <section class="overview mb-6">
            <div id="podium-display" class="podium-container mx-auto">
                <!-- Top 3 podium populated by JS -->
            </div>

            <div class="card p-0" style="overflow: hidden;">
                <div class="table-wrapper" style="border: none; box-shadow: none;">
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Username</th>
                                <th>Level</th>
                                <th>XP</th>
                                <th>Net Worth (Cash + Portfolio)</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <tr><td colspan="5" style="padding:2rem; text-align:center; color:var(--text-secondary);">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/leaderboard.js"></script>
    <script>
        authCheck();
        fetchProfile();
        loadLeaderboard();
    </script>
</body>

</html>
