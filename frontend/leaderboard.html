<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finova - Global Leaderboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dashboard-layout animate-fade-in">
    
    <aside class="sidebar">
        <div class="logo">🚀 Finova</div>
        <nav>
            <div class="nav-label">Main menu</div>
            <ul>
                <li><a href="/dashboard.html">🏠 Dashboard</a></li>
                <li><a href="/leaderboard.html" class="active">🏆 Leaderboard</a></li>
            </ul>
            <div class="nav-label">Learning Modules</div>
            <ul>
                <li><a href="/stock_market.html">📈 Stock Simulator</a></li>
                <li><a href="/scams.html">🛡️ UPI Safety</a></li>
                <li><a href="/tax.html">📄 Tax Challenge</a></li>
            </ul>
            <div class="nav-label">Account</div>
            <ul>
                <li><button class="btn btn-outline w-100" onclick="logout()" style="margin-top: 1rem;">Log Out</button></li>
            </ul>
        </nav>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h2>🏆 Global Leaderboard</h2>
                <p class="text-secondary">Are you the ultimate Hustler? Compete for the #1 spot.</p>
            </div>
            <div class="user-stats">
                <div class="stat-pill xp-pill">Lvl <span id="level-txt">1</span> | <span id="xp-txt">0</span> XP</div>
                <div class="stat-pill balance-pill">₹<span id="balance-txt">10000.00</span></div>
            </div>
        </header>

        <section class="overview mb-6">
            <div id="podium-display" class="podium-container">
                <!-- Top 3 podium populated by JS -->
            </div>

            <div class="card p-0" style="width: 100%; border: none; overflow: hidden; background: transparent; box-shadow: none;">
                <h3 class="font-mono mb-4 text-primary-color">The Rankings</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Hustler</th>
                                <th>Level</th>
                                <th>XP Points</th>
                                <th>Net Worth (₹)</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/leaderboard.js"></script>
    <script>
        authCheck();
        fetchProfile();
        loadLeaderboard();
    </script>
</body>
</html>
